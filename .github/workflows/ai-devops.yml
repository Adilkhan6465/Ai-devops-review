name: AI DevOps Review
 
on:
  pull_request:
  types: [opened, synchronize, reopened]
 
jobs:
  ai-review:
  runs-on: ubuntu-latest
  permissions:
    pull-requests: write   # Required to post comments
    contents: read
 
  steps:
  - name: Checkout code
    uses: actions/checkout@v4
    with:
      fetch-depth: 0   	# Fetch full history for accurate diff
 
  - name: Get PR diff (corrected)
    run: |
      git fetch --depth=50 origin ${{ github.base_ref }}
      git diff origin/${{ github.base_ref }}...HEAD > diff.txt
      echo "Diff size: $(wc -l < diff.txt) lines"
 
  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'
 
  - name: Install dependencies
    run: pip install openai anthropic google-genai requests
 
  - name: Run AI Review
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    run: python scripts/review/ai_review.py
 
  - name: Post PR comment
    if: always()   # Post even if review fails
    uses: actions/github-script@v7
    with:
      script: |
        const fs = require('fs');
        const review = fs.readFileSync('generated/review.txt', 'utf8');
        github.rest.issues.createComment({
        issue_number: context.issue.number,
          owner: context.repo.owner,
          repo: context.repo.repo,
          body: review
        });